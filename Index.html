</head>

  <body>
    <div class="d-flex">
      <nav class="bg-dark text-white p-3" style="width: 250px; height: 100vh;">
  <h3 class="mb-4">Dashboard</h3>
  <ul class="nav flex-column" id="main-nav">
    <li class="nav-item">
      <a href="#" class="nav-link text-white py-3 active" onclick="loadPage(this, 'Home')">
        <i class="fa-solid fa-house me-2"></i></i> Home
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link text-white py-3" onclick="loadPage(this, 'Search')">
        <i class="fa-solid fa-magnifying-glass me-2"></i> Search
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link text-white py-3" onclick="loadPage(this, 'Analysis')">
        <i class="fa-solid fa-chart-simple me-2"></i> Analysis
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link text-white py-3" onclick="loadPage(this, 'All_Equipment')">
        <i class="fa-regular fa-pen-to-square me-2"></i> All Equipment
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link text-white py-3" onclick="loadPage(this, 'User_Management')">
        <i class="fa-regular fa-user me-2"></i> User Management
      </a>
    </li>
    <hr>
    <li class="nav-item">
      <a href="#" class="nav-link text-danger py-3" onclick="logout()">
        <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Logout
      </a>
    </li>
  </ul>
</nav>

      <div id="content" class="p-4 w-100">
        <h1>กำลังโหลด...</h1>
      </div>
    </div>

    <script>
  function loadPage(element, pageName) {
    // 1. จัดการเรื่องสีของ Menu (Active State)
    if (element) {
      // ลบ class 'bg-primary' หรือ 'active' ออกจากเมนูอื่นก่อน
      let links = document.querySelectorAll('.nav-link');
      links.forEach(link => link.classList.remove('bg-primary', 'active'));
      
      // เพิ่มสีไฮไลท์ให้เมนูที่คลิก (เหมือนในรูป User Management ที่เป็นสีฟ้า)
      element.classList.add('bg-primary', 'active');
    }

    // 2. เรียกข้อมูลจากฝั่ง Server
    document.getElementById('content').innerHTML = 'กำลังโหลด...'; // แสดงสถานะโหลด
    
    google.script.run.withSuccessHandler(function(html) {
  document.getElementById('content').innerHTML = html;
}).getPageHTML(pageName);
  }

  function logout() {
    // ใส่คำสั่ง Logout เช่น redirect ไปหน้าอื่น หรือปิดหน้าต่าง
    if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
       window.top.location.href = "https://www.google.com";
    }
  }
  
  // โหลดหน้าแรกตอนเปิด โดยให้เมนูแรก Active
  window.onload = () => {
    let firstMenu = document.querySelector('.nav-link');
    loadPage(firstMenu, 'Home');
  };
</script>
  </body>
</html>
